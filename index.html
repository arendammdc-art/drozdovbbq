<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drozdov Smokers</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="hero">
<div class="hero-content">

<h1>Смокеры на заказ</h1>

<p>
Ручная работа.  
4 недели изготовления.  
Средняя стоимость — 180 000 ₽
</p>

<a href="#contact" class="button">Оставить заявку</a>

</div>
</section>

<section class="features">

<h2>Почему мои смокеры</h2>

<div class="features-grid">

<div class="feature">
Сталь 6–8 мм
</div>

<div class="feature">
Равномерная тяга без «мертвых зон»
</div>

<div class="feature">
Индивидуальная конфигурация
</div>

<div class="feature">
Ручная сборка
</div>

</div>

</section>

<section class="contact" id="contact">

<h2>Оставить заявку</h2>

<form>

<input type="text" placeholder="Ваше имя" required>

<input type="tel" placeholder="Телефон">

<textarea placeholder="Какой смокер хотели бы заказать?"></textarea>

<button type="submit">
Отправить
</button>

</form>

</section>

</body>
</html>
